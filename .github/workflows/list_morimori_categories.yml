name: List Morimori Categories (Debug)

on:
  workflow_dispatch:

jobs:
  list-categories:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install requests

      - name: List sitemap categories and probe missing ones
        run: python list_morimori_categories.py
