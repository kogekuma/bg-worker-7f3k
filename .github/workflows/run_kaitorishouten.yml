name: Kaitorishouten Scraper

on:
  schedule:
    - cron: "*/30 * * * *"   # 30分ごと（実行時間が17〜25分のため15分では足りない）
  workflow_dispatch:           # 手動実行

concurrency:
  group: kaitorishouten
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run_kaitorishouten.py

      - name: Push to Scanner repo
        env:
          PAT: ${{ secrets.SCANNER_PAT }}
        run: |
          if [ ! -f kaitorishouten.json ]; then
            echo "kaitorishouten.json が生成されていないためスキップ（接続失敗）"
            exit 0
          fi
          git clone https://kogekuma:$PAT@github.com/kogekuma/Scanner.git scanner_repo
          cp kaitorishouten.json scanner_repo/docs/data/kaitorishouten.json
          cd scanner_repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/kaitorishouten.json
          git diff --cached --quiet || \
            git commit -m "chore: update kaitorishouten data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
