name: Morimori Scraper

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: morimori
  cancel-in-progress: true

jobs:
  scrape:
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4]
      fail-fast: false   # 1シャードが失敗しても他は継続
    runs-on: ubuntu-latest
    timeout-minutes: 13

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run morimori shard ${{ matrix.shard }}
        run: python run_morimori.py --shard ${{ matrix.shard }} --total-shards 5

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: morimori-shard-${{ matrix.shard }}
          path: morimori_shard_${{ matrix.shard }}.json
          retention-days: 1

  merge:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: morimori-shard-*
          merge-multiple: true

      - name: Merge shards
        run: python merge_morimori.py

      - name: Push to Scanner repo
        env:
          PAT: ${{ secrets.SCANNER_PAT }}
        run: |
          git clone https://kogekuma:$PAT@github.com/kogekuma/Scanner.git scanner_repo
          cp morimori.json scanner_repo/docs/data/morimori.json
          cd scanner_repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/morimori.json
          git diff --cached --quiet || \
            git commit -m "chore: update morimori data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
